<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#0f766e">
  <title>GestHôte</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app"><div class="splash"><div class="logo">🏠</div></div></div>
  <script type="module" src="app.js"></script>
  <script>
    // Version installée + repo PUBLIC de releases interrogé par update-check.js.
    // Code source privé (laurentsar/gesthote) ; APK/versions publiés sur
    // laurentsar/gesthote-releases (public) par le CI.
    const APP_VERSION = '1.8.0';
    window.APP_VERSION = APP_VERSION;
    window.UPDATE_REPO = 'laurentsar/gesthote-releases';

    // Synchronisation cloud (optionnelle) — laissez `null` pour un usage 100%
    // local (par défaut, aucun changement de comportement). Pour activer la
    // synchro temps réel entre appareils : collez ici la config de votre
    // projet Firebase (Console Firebase → Paramètres du projet → Général →
    // "Vos applications" → app Web → objet firebaseConfig). Ce n'est PAS un
    // secret : cette config est faite pour être visible côté client, la
    // sécurité repose sur les règles Firestore + l'authentification.
    window.FIREBASE_CONFIG = null;
    // Exemple :
    // window.FIREBASE_CONFIG = {
    //   apiKey: "AIza...", authDomain: "gesthote.firebaseapp.com",
    //   projectId: "gesthote", storageBucket: "gesthote.appspot.com",
    //   messagingSenderId: "123456789", appId: "1:123456789:web:abcdef"
    // };

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
      let swRefreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (!swRefreshing) { swRefreshing = true; window.location.reload(); }
      });
    }
  </script>
  <script src="update-check.js" defer></script>
</body>
</html>
