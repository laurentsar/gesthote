<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#0c3c2d">
  <title>GestHôte</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="img/icon-192.png">
  <link rel="apple-touch-icon" href="img/icon-512.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app"><div class="splash"><img class="logo" src="img/icon-flat.png" alt=""></div></div>

<details id="backup-details" style="margin:16px auto;max-width:900px;padding:0 12px">
  <summary style="cursor:pointer;font-weight:600;padding:8px 0">💾 Sauvegarde des données</summary>
  <p style="font-size:13px;opacity:.8">Tes données vivent sur ce téléphone : désinstaller l'app
  les efface. Renseigne Home Assistant ci-dessous et la sauvegarde devient automatique.</p>
  <div id="backup-panel"></div>
</details>

  <script type="module" src="app.js"></script>
  <script>
    // Version installée + repo PUBLIC de releases interrogé par update-check.js.
    // Code source privé (laurentsar/gesthote) ; APK/versions publiés sur
    // laurentsar/gesthote-releases (public) par le CI.
    const APP_VERSION = '1.8.13';
    window.APP_VERSION = APP_VERSION;
    window.UPDATE_REPO = 'laurentsar/gesthote-releases';

    // Synchronisation cloud (optionnelle) — laissez `null` pour un usage 100%
    // local (par défaut, aucun changement de comportement). Pour activer la
    // synchro temps réel entre appareils : collez ici la config de votre
    // projet Firebase (Console Firebase → Paramètres du projet → Général →
    // "Vos applications" → app Web → objet firebaseConfig). Ce n'est PAS un
    // secret : cette config est faite pour être visible côté client, la
    // sécurité repose sur les règles Firestore + l'authentification.
    window.FIREBASE_CONFIG = {
      apiKey: "AIzaSyAzTVhktmk2H_dbh8PN3JBLz1Wnzox2C6c",
      authDomain: "gesthote-4fab3.firebaseapp.com",
      projectId: "gesthote-4fab3",
      storageBucket: "gesthote-4fab3.firebasestorage.app",
      messagingSenderId: "302635673844",
      appId: "1:302635673844:web:424faea91e72bfe29216a1"
    };

    // Email qui doit toujours être reconnu comme Admin, quel que soit le
    // contenu du document cloud (auto-réparation en cas de désynchro).
    // Laissez vide ("") pour revenir à l'ancien comportement (le premier
    // compte à se connecter devient Admin).
    window.ADMIN_EMAIL = "clabaut-louise@hotmail.fr";

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
      let swRefreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (!swRefreshing) { swRefreshing = true; window.location.reload(); }
      });
    }
  </script>
  <script src="update-check.js" defer></script>
  <script>window.BACKUP_APP = 'gesthote';</script>
  <script src="autobackup.js"></script>
  <script>AutoBackup.mount(document.getElementById('backup-panel'));</script>
</body>
</html>
